<svg viewBox="0 0 260 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SOS Pet Amigo">
  <!-- Badge SOS -->
  <rect x="0" y="0" width="80" height="64" rx="8" fill="#FF851B"/>
  <rect x="12" y="10" width="56" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
  <text
    x="40" y="45"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="900"
    font-size="28"
    fill="white"
    text-anchor="middle"
    letter-spacing="2"
  >SOS</text>

  <!-- Wordmark Pet — branco no dark -->
  <text
    x="96" y="38"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="30"
    fill="#20B2AA"
  >Pet</text>

  <!-- Wordmark Amigo — cinza claro no dark -->
  <text
    x="98" y="56"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="400"
    font-size="13"
    fill="#6B7A84"
    letter-spacing="5"
  >AMIGO</text>

  <circle cx="88" cy="50" r="2.5" fill="#FF851B" opacity="0.6"/>
</svg>
