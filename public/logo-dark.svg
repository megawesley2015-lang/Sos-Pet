<svg viewBox="0 0 290 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SOS Pet Aumigo">
  <!-- Círculo badge laranja -->
  <circle cx="40" cy="40" r="36" fill="#FF851B"/>

  <!-- Linha de tensão -->
  <line x1="15" y1="13" x2="65" y2="13"
    stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- SOS bold branco -->
  <text x="40" y="50"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-weight="900" font-size="23" fill="white"
    text-anchor="middle" letter-spacing="3">SOS</text>

  <!-- Arcos de sinal em teal -->
  <g fill="none" stroke-linecap="round">
    <path d="M 78,27 Q 95,40 78,53"  stroke="#20B2AA" stroke-width="3.5"/>
    <path d="M 78,16 Q 112,40 78,64" stroke="#20B2AA" stroke-width="2.5"/>
    <path d="M 78,5  Q 129,40 78,75" stroke="#20B2AA" stroke-width="2"/>
  </g>

  <!-- Wordmark versão dark — Pet/migo mais claros -->
  <text x="138" y="51"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="28" font-weight="700">
    <tspan fill="#3DD6CC">Pet </tspan><tspan fill="#FF851B" font-weight="900">AU</tspan><tspan fill="#3DD6CC">migo</tspan>
  </text>
</svg>
