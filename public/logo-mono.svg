<svg viewBox="0 0 290 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SOS Pet Aumigo">
  <!-- Círculo badge branco -->
  <circle cx="40" cy="40" r="36" fill="white"/>

  <!-- Linha de tensão -->
  <line x1="15" y1="13" x2="65" y2="13"
    stroke="rgba(0,0,0,0.2)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- SOS em escuro -->
  <text x="40" y="50"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-weight="900" font-size="23" fill="#FF851B"
    text-anchor="middle" letter-spacing="3">SOS</text>

  <!-- Arcos de sinal brancos com opacidade -->
  <g fill="none" stroke-linecap="round">
    <path d="M 78,27 Q 95,40 78,53"  stroke="white" stroke-width="3.5" opacity="0.7"/>
    <path d="M 78,16 Q 112,40 78,64" stroke="white" stroke-width="2.5" opacity="0.5"/>
    <path d="M 78,5  Q 129,40 78,75" stroke="white" stroke-width="2"   opacity="0.35"/>
  </g>

  <!-- Wordmark branco (para fundos coloridos) -->
  <text x="138" y="51"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="28" font-weight="700">
    <tspan fill="white">Pet </tspan><tspan fill="white" font-weight="900" opacity="0.85">AU</tspan><tspan fill="white">migo</tspan>
  </text>
</svg>
