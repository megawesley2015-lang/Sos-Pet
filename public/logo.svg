<svg viewBox="0 0 268 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pet Aumigo">
  <!-- Círculo badge — o AU (latido) como sinal de busca -->
  <circle cx="40" cy="40" r="36" fill="#FF851B"/>

  <!-- AU bold branco -->
  <text x="40" y="52"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-weight="900" font-size="26" fill="white"
    text-anchor="middle" letter-spacing="-1">AU</text>

  <!-- Arcos de sinal — o latido se propaga -->
  <g fill="none" stroke-linecap="round">
    <path d="M 78,27 Q 95,40 78,53"  stroke="#20B2AA" stroke-width="3.5"/>
    <path d="M 78,16 Q 112,40 78,64" stroke="#20B2AA" stroke-width="2.5"/>
    <path d="M 78,5  Q 129,40 78,75" stroke="#20B2AA" stroke-width="2"/>
  </g>

  <!-- Wordmark: Pet AUmigo — AU laranja conecta com o badge -->
  <text x="136" y="51"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="28" font-weight="700">
    <tspan fill="#20B2AA">Pet </tspan><tspan fill="#FF851B" font-weight="900">AU</tspan><tspan fill="#20B2AA">migo</tspan>
  </text>
</svg>
