<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 114" overflow="visible" role="img" aria-label="SOS Pet Aumigo — Achados e Perdidos">
  <defs>
    <filter id="paw-neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ícone com glow neon laranja -->
  <g filter="url(#paw-neon)">
    <circle cx="56" cy="54" r="43" fill="none" stroke="#FF851B" stroke-width="3.5"/>
    <ellipse cx="38" cy="55" rx="5.5" ry="5"   fill="#FF851B"/>
    <ellipse cx="49" cy="45" rx="6.5" ry="6"   fill="#FF851B"/>
    <ellipse cx="63" cy="45" rx="6.5" ry="6"   fill="#FF851B"/>
    <ellipse cx="74" cy="55" rx="5.5" ry="5"   fill="#FF851B"/>
    <ellipse cx="56" cy="67" rx="12.5" ry="11" fill="#FF851B"/>
  </g>

  <!-- Texto principal -->
  <text font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="44" font-weight="700" y="74">
    <tspan x="116" font-weight="800" fill="#FF851B">SOS </tspan><tspan fill="#FF851B">pet </tspan><tspan fill="#111111">aumigo</tspan>
  </text>

  <!-- Subtítulo: fonte maior, cor mais legível -->
  <text x="116" y="100" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" font-weight="500" fill="#888888" letter-spacing="1.5">ACHADOS &amp; PERDIDOS</text>
</svg>
